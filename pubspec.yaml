name: aurix_gold_wallet
description: Aurix - Digital Gold Wallet for fintech-grade gold asset management.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^13.0.1
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.19.0
  fl_chart: ^0.67.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  http: ^1.6.0
  flutter_dotenv: ^5.1.0
  uuid: ^4.3.3
  email_validator: ^2.1.17
  shimmer: ^3.0.0
  lottie: ^3.0.0
  gap: ^3.0.1
  cached_network_image: ^3.3.1
  iconsax: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
